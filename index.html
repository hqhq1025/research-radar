<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Radar</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --accent2: #3fb950;
      --accent3: #d2a8ff;
      --accent4: #f0883e;
      --tag-bg: #1f2937;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    .header {
      padding: 1.5rem 1rem 1rem;
      text-align: center;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .lang-toggle {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .lang-toggle button {
      background: none;
      border: none;
      color: var(--text-dim);
      padding: 0.3rem 0.6rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-toggle button.active {
      background: var(--accent);
      color: var(--bg);
      font-weight: 600;
    }

    .date-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .date-nav button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.35rem 0.65rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .date-nav button:hover { background: var(--surface2); }
    .date-nav button:disabled { opacity: 0.3; cursor: default; }
    .date-nav .current-date {
      font-size: 1rem;
      font-weight: 600;
      min-width: 130px;
      text-align: center;
    }

    .container { max-width: 800px; margin: 0 auto; padding: 0 1rem 3rem; }

    .section { margin-top: 1.5rem; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0;
      font-size: 1.05rem;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.6rem;
    }
    .section-header .count {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-weight: 400;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      margin-bottom: 0.6rem;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--accent); }
    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .card-title a { color: var(--accent); text-decoration: none; }
    .card-title a:hover { text-decoration: underline; }
    .card-meta {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 0.3rem;
    }
    .card-tldr {
      font-size: 0.88rem;
      color: var(--accent2);
      font-weight: 500;
      margin-bottom: 0.25rem;
      line-height: 1.5;
    }
    .card-tldr::before {
      content: "TLDR: ";
      font-weight: 700;
      color: var(--accent4);
    }
    .card-summary {
      font-size: 0.82rem;
      color: var(--text);
      opacity: 0.75;
      display: none;
    }
    .card.expanded .card-summary { display: block; margin-top: 0.3rem; }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.4rem;
    }
    .tag {
      font-size: 0.68rem;
      background: var(--tag-bg);
      color: var(--accent3);
      padding: 0.12rem 0.45rem;
      border-radius: 10px;
    }
    .expand-btn {
      font-size: 0.75rem;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.2rem 0;
      margin-top: 0.2rem;
    }
    .expand-btn:hover { color: var(--accent); }

    .briefing {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.1rem;
      line-height: 1.75;
      font-size: 0.88rem;
    }
    .briefing p {
      margin-bottom: 0.75rem;
    }
    .briefing p:last-child { margin-bottom: 0; }

    .loading, .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-dim);
    }
    .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-dim);
      font-size: 0.75rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }
    .footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 600px) {
      .header h1 { font-size: 1.25rem; }
      .card { padding: 0.7rem 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔭 Research Radar</h1>
    <p id="subtitle">每日 AI 研究速递 — 论文 · 开源 · 讨论</p>
  </div>

  <div class="toolbar">
    <div class="lang-toggle">
      <button class="active" onclick="setLang('zh')">中文</button>
      <button onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div class="date-nav">
    <button id="prev-btn" onclick="navigate(-1)">←</button>
    <span class="current-date" id="current-date">Loading...</span>
    <button id="next-btn" onclick="navigate(1)">→</button>
  </div>

  <div class="container" id="content">
    <div class="loading"><div class="spinner"></div><div>加载中...</div></div>
  </div>

  <div class="footer">
    每日自动更新 · <a href="https://github.com/hqhq1025/research-radar">GitHub</a>
  </div>

  <script>
    let availableDates = [];
    let currentIdx = 0;
    let currentData = null;
    let lang = 'zh';

    const SUBTITLES = {
      zh: '每日 AI 研究速递 — 论文 · 开源 · 讨论',
      en: 'Daily AI Research Digest — Papers · Repos · Discussions'
    };
    const SECTION_TITLES = {
      huggingface: { zh: 'HuggingFace 每日论文', en: 'HuggingFace Daily Papers' },
      alphaxiv:    { zh: 'alphaxiv 热门论文', en: 'alphaxiv Trending' },
      github:      { zh: 'GitHub 热门仓库', en: 'GitHub Trending Repos' },
      hackernews:  { zh: 'Hacker News 热议', en: 'Hacker News Discussions' }
    };
    const LOADING_TEXT = { zh: '加载中...', en: 'Loading...' };
    const FOOTER_TEXT = { zh: '每日自动更新', en: 'Auto-updated daily' };

    function setLang(l) {
      lang = l;
      document.querySelectorAll('.lang-toggle button').forEach(b => {
        b.classList.toggle('active', b.textContent.trim() === (l === 'zh' ? '中文' : 'EN'));
      });
      document.getElementById('subtitle').textContent = SUBTITLES[l];
      if (currentData) renderDigest(currentData);
    }

    async function init() {
      try {
        const resp = await fetch(`./data/index.json?t=${Date.now()}`);
        availableDates = await resp.json();
        if (availableDates.length === 0) { showEmpty(); return; }
        currentIdx = 0;
        loadDate(availableDates[0]);
      } catch (e) { showEmpty(); }
    }

    function navigate(dir) {
      const n = currentIdx + dir;
      if (n < 0 || n >= availableDates.length) return;
      currentIdx = n;
      loadDate(availableDates[n]);
    }

    function updateNav() {
      document.getElementById('prev-btn').disabled = currentIdx >= availableDates.length - 1;
      document.getElementById('next-btn').disabled = currentIdx <= 0;
      document.getElementById('current-date').textContent = availableDates[currentIdx];
    }

    async function loadDate(date) {
      updateNav();
      document.getElementById('content').innerHTML =
        `<div class="loading"><div class="spinner"></div><div>${LOADING_TEXT[lang]}</div></div>`;
      try {
        const resp = await fetch(`./data/${date}.json?t=${Date.now()}`);
        currentData = await resp.json();
        renderDigest(currentData);
      } catch (e) { showEmpty(); }
    }

    function showEmpty() {
      document.getElementById('content').innerHTML =
        '<div class="empty"><div style="font-size:2rem">📡</div><div>暂无数据</div></div>';
    }

    function renderDigest(data) {
      let html = '';

      // Briefing
      const briefing = lang === 'zh' ? data.briefing_zh : data.briefing_en;
      if (briefing) {
        const paragraphs = briefing.split('\n\n').filter(Boolean);
        html += `<div class="section">
          <div class="section-header"><span>📋</span> ${lang === 'zh' ? '今日简报' : 'Daily Briefing'}</div>
          <div class="briefing">${paragraphs.map(p => `<p>${esc(p)}</p>`).join('')}</div>
        </div>`;
      }

      // HuggingFace papers
      const hf = data.huggingface_papers || [];
      if (hf.length) {
        html += section('🤗', 'huggingface', hf.length, hf.map(p => {
          const title = lang === 'zh' ? (p.title_zh || p.title) : p.title;
          const tldr = lang === 'zh' ? (p.tldr_zh || p.tldr || '') : (p.tldr || '');
          const meta = [p.upvotes ? `👍 ${p.upvotes}` : '', p.authors || ''].filter(Boolean).join(' · ');
          return card(title, p.url, meta, tldr, p.summary, p.ai_keywords || []);
        }).join(''));
      }

      // alphaxiv
      const ax = data.alphaxiv_papers || [];
      if (ax.length) {
        html += section('🔬', 'alphaxiv', ax.length, ax.map(p => {
          const title = lang === 'zh' ? (p.title_zh || p.title) : p.title;
          const tldr = lang === 'zh' ? (p.tldr_zh || p.tldr || '') : (p.tldr || '');
          const meta = p.arxiv_id || '';
          return card(title, p.alphaxiv_url || p.url, meta, tldr, p.summary, []);
        }).join(''));
      }

      // GitHub
      const gh = data.github_repos || [];
      if (gh.length) {
        html += section('⭐', 'github', gh.length, gh.map(r => {
          const desc = lang === 'zh' ? (r.description_zh || r.description) : r.description;
          const tldr = lang === 'zh' ? (r.tldr_zh || r.tldr || desc || '') : (r.tldr || r.description || '');
          const meta = [r.language, r.stars !== undefined ? `⭐ ${r.stars}` : ''].filter(Boolean).join(' · ');
          return card(r.name, r.url, meta, tldr, '', r.topics || []);
        }).join(''));
      }

      // HN
      const hn = data.hackernews || [];
      if (hn.length) {
        html += section('🔥', 'hackernews', hn.length, hn.map(h => {
          const title = lang === 'zh' ? (h.title_zh || h.title) : h.title;
          const tldr = lang === 'zh' ? (h.tldr_zh || h.tldr || '') : (h.tldr || '');
          const meta = [h.points ? `${h.points} pts` : '', h.num_comments !== undefined ? `💬 ${h.num_comments}` : ''].filter(Boolean).join(' · ');
          return card(title, h.url, meta, tldr, '', []);
        }).join(''));
      }

      document.getElementById('content').innerHTML = html || '<div class="empty">暂无数据</div>';
    }

    function section(icon, key, count, cardsHTML) {
      const title = SECTION_TITLES[key]?.[lang] || key;
      return `<div class="section">
        <div class="section-header"><span>${icon}</span> ${esc(title)} <span class="count">(${count})</span></div>
        ${cardsHTML}
      </div>`;
    }

    function card(title, url, meta, tldr, summary, tags) {
      let h = `<div class="card">
        <div class="card-title"><a href="${esc(url)}" target="_blank" rel="noopener">${esc(title)}</a></div>`;
      if (meta) h += `<div class="card-meta">${esc(meta)}</div>`;
      if (tldr) h += `<div class="card-tldr">${esc(tldr)}</div>`;
      if (summary) h += `<div class="card-summary">${esc(trunc(summary, 300))}</div>`;
      if (tags.length) h += `<div class="card-tags">${tags.slice(0, 5).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>`;
      h += '</div>';
      return h;
    }

    function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function trunc(s, n) { return s && s.length > n ? s.substring(0, n) + '...' : (s || ''); }

    init();
  </script>
</body>
</html>
