<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Radar</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --accent2: #3fb950;
      --accent3: #d2a8ff;
      --accent4: #f0883e;
      --tag-bg: #1f2937;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    .header {
      padding: 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }
    .date-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .date-nav button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .date-nav button:hover { background: var(--surface2); }
    .date-nav button:disabled { opacity: 0.3; cursor: default; }
    .date-nav .current-date {
      font-size: 1rem;
      font-weight: 600;
      min-width: 140px;
      text-align: center;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 0 1rem 3rem; }

    .section {
      margin-top: 1.5rem;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 0;
      font-size: 1.1rem;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }
    .section-header .icon { font-size: 1.2rem; }
    .section-header .count {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-weight: 400;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--accent); }
    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
    }
    .card-title a {
      color: var(--accent);
      text-decoration: none;
    }
    .card-title a:hover { text-decoration: underline; }
    .card-meta {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 0.35rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .card-summary {
      font-size: 0.85rem;
      color: var(--text);
      opacity: 0.9;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.5rem;
    }
    .tag {
      font-size: 0.7rem;
      background: var(--tag-bg);
      color: var(--accent3);
      padding: 0.15rem 0.5rem;
      border-radius: 10px;
    }
    .stats { display: flex; gap: 1rem; align-items: center; }
    .stat {
      font-size: 0.8rem;
      color: var(--text-dim);
    }
    .stat .num { color: var(--accent4); font-weight: 600; }

    .loading {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-dim);
    }
    .loading .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-dim);
    }
    .empty .icon { font-size: 2rem; margin-bottom: 0.5rem; }

    .footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-dim);
      font-size: 0.75rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }
    .footer a { color: var(--accent); text-decoration: none; }

    /* topic filter pills */
    .topic-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.75rem 0;
      justify-content: center;
    }
    .topic-pill {
      font-size: 0.8rem;
      padding: 0.3rem 0.75rem;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }
    .topic-pill:hover { border-color: var(--accent); color: var(--text); }
    .topic-pill.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .header h1 { font-size: 1.25rem; }
      .card { padding: 0.75rem; }
      .card-meta { gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔭 Research Radar</h1>
    <p>Daily AI research digest — papers, repos & discussions</p>
  </div>

  <div class="date-nav">
    <button id="prev-btn" onclick="navigate(-1)">← Prev</button>
    <span class="current-date" id="current-date">Loading...</span>
    <button id="next-btn" onclick="navigate(1)">Next →</button>
  </div>

  <div class="container" id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div>Loading digest...</div>
    </div>
  </div>

  <div class="footer">
    Auto-updated daily · Powered by <a href="https://github.com/hqhq1025/research-radar">research-radar</a>
  </div>

  <script>
    const BASE_URL = '.'; // relative path — works on GitHub Pages
    let availableDates = [];
    let currentIdx = 0;

    async function init() {
      try {
        const resp = await fetch(`${BASE_URL}/data/index.json?t=${Date.now()}`);
        availableDates = await resp.json();
        if (availableDates.length === 0) {
          showEmpty('No digests yet — check back tomorrow!');
          return;
        }
        currentIdx = 0; // latest first
        loadDate(availableDates[currentIdx]);
      } catch (e) {
        showEmpty('Failed to load data. Please try again later.');
      }
    }

    function navigate(dir) {
      const newIdx = currentIdx + dir;
      if (newIdx < 0 || newIdx >= availableDates.length) return;
      currentIdx = newIdx;
      loadDate(availableDates[currentIdx]);
    }

    function updateNav() {
      document.getElementById('prev-btn').disabled = currentIdx >= availableDates.length - 1;
      document.getElementById('next-btn').disabled = currentIdx <= 0;
      document.getElementById('current-date').textContent = availableDates[currentIdx];
    }

    async function loadDate(date) {
      updateNav();
      document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading...</div></div>';
      try {
        const resp = await fetch(`${BASE_URL}/data/${date}.json?t=${Date.now()}`);
        const data = await resp.json();
        renderDigest(data);
      } catch (e) {
        showEmpty('Could not load this day\'s digest.');
      }
    }

    function showEmpty(msg) {
      document.getElementById('content').innerHTML = `<div class="empty"><div class="icon">📡</div><div>${msg}</div></div>`;
    }

    function renderDigest(data) {
      let html = '';

      // HuggingFace papers
      const hfPapers = data.huggingface_papers || [];
      if (hfPapers.length > 0) {
        html += renderSection('🤗', 'HuggingFace Daily Papers', hfPapers.length, hfPapers.map(p => {
          const url = p.url || (p.arxiv_id ? `https://arxiv.org/abs/${p.arxiv_id}` : '#');
          const meta = [];
          if (p.upvotes) meta.push(`👍 ${p.upvotes}`);
          if (p.authors) meta.push(truncate(p.authors, 60));
          return cardHTML(p.title, url, meta.join(' · '), p.ai_summary || p.summary || '', p.ai_keywords || []);
        }).join(''));
      }

      // alphaxiv trending papers
      const axPapers = data.alphaxiv_papers || [];
      if (axPapers.length > 0) {
        html += renderSection('🔬', 'alphaxiv Trending', axPapers.length, axPapers.map(p => {
          const url = p.alphaxiv_url || p.url || '#';
          const meta = [];
          if (p.arxiv_id) meta.push(p.arxiv_id);
          return cardHTML(p.title, url, meta.join(' · '), p.summary || '', []);
        }).join(''));
      }

      // GitHub repos
      const repos = data.github_repos || [];
      if (repos.length > 0) {
        html += renderSection('⭐', 'GitHub Repos', repos.length, repos.map(r => {
          const meta = [];
          if (r.language) meta.push(r.language);
          if (r.stars !== undefined) meta.push(`⭐ ${r.stars}`);
          if (r.forks !== undefined) meta.push(`🔱 ${r.forks}`);
          return cardHTML(r.name || r.full_name, r.url || r.html_url || '#', meta.join(' · '), r.description || '', r.topics || []);
        }).join(''));
      }

      // HN discussions
      const hn = data.hackernews || [];
      if (hn.length > 0) {
        html += renderSection('🔥', 'Hacker News', hn.length, hn.map(h => {
          const meta = [];
          if (h.points) meta.push(`${h.points} points`);
          if (h.num_comments !== undefined) meta.push(`💬 ${h.num_comments}`);
          if (h.author) meta.push(h.author);
          return cardHTML(h.title, h.url || '#', meta.join(' · '), '', []);
        }).join(''));
      }

      if (!html) {
        showEmpty('No items for this day.');
        return;
      }
      document.getElementById('content').innerHTML = html;
    }

    function renderSection(icon, title, count, cardsHTML) {
      return `<div class="section">
        <div class="section-header">
          <span class="icon">${icon}</span>
          ${title}
          <span class="count">(${count})</span>
        </div>
        ${cardsHTML}
      </div>`;
    }

    function cardHTML(title, url, meta, summary, tags) {
      let html = `<div class="card">
        <div class="card-title"><a href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(title)}</a></div>`;
      if (meta) html += `<div class="card-meta">${escapeHtml(meta)}</div>`;
      if (summary) html += `<div class="card-summary">${escapeHtml(truncate(summary, 200))}</div>`;
      if (tags && tags.length > 0) {
        html += `<div class="card-tags">${tags.slice(0, 5).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>`;
      }
      html += '</div>';
      return html;
    }

    function escapeHtml(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function truncate(s, n) {
      if (!s) return '';
      return s.length > n ? s.substring(0, n) + '...' : s;
    }

    init();
  </script>
</body>
</html>
